<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Shortcuts</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>Search Shortcuts</h1>
  <div id="shortcut-list"></div>
  <input type="text" id="shortcut" placeholder="Shortcut (e.g., yt)" />
  <input type="text" id="url" placeholder="URL template (e.g., https://youtube.com/results?search_query=)" />
  <button id="add-shortcut">Add Shortcut</button>
  <script src="popup.js"></script>
</body>
</html>
